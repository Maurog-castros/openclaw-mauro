apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-memory
spec:
  serviceName: postgres-memory
  replicas: 1
  selector:
    matchLabels:
      app: postgres-memory
  template:
    metadata:
      labels:
        app: postgres-memory
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-memory-secrets
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
