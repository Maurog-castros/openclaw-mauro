apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-memory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-memory
  template:
    metadata:
      labels:
        app: redis-memory
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
